<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Persona Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e8eaed;
      height: 100vh;
      display: flex;
    }
    aside {
      width: 280px;
      background: #171923;
      border-right: 1px solid #2d3148;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    aside h1 { font-size: 1.2rem; }
    aside p { font-size: 0.85rem; color: #9aa0b4; line-height: 1.5; }
    label { font-size: 0.8rem; color: #9aa0b4; }
    select, button {
      width: 100%;
      padding: 0.65rem;
      border-radius: 8px;
      border: 1px solid #2d3148;
      background: #0f1117;
      color: #e8eaed;
      font-size: 0.95rem;
      cursor: pointer;
    }
    button.primary {
      background: #6366f1;
      border-color: #6366f1;
      font-weight: 600;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #2d3148;
    }
    header h2 { font-size: 1.1rem; }
    header span { color: #9aa0b4; font-size: 0.85rem; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      line-height: 1.55;
      font-size: 0.95rem;
    }
    .msg.user {
      align-self: flex-end;
      background: #6366f1;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e2130;
      border: 1px solid #2d3148;
    }
    .msg.assistant pre {
      background: #0f1117;
      padding: 0.75rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 0.5rem 0;
    }
    .msg.assistant code { font-family: monospace; font-size: 0.85rem; }
    .empty {
      color: #9aa0b4;
      text-align: center;
      margin-top: 3rem;
    }
    form {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1.25rem;
      border-top: 1px solid #2d3148;
    }
    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #2d3148;
      background: #171923;
      color: #e8eaed;
      font-size: 0.95rem;
    }
    form button {
      width: auto;
      padding: 0.75rem 1.25rem;
    }
    .typing { color: #9aa0b4; font-style: italic; padding: 0 1.25rem 1rem; }
    @media (max-width: 700px) {
      aside { display: none; }
    }
  </style>
</head>
<body>
  <aside>
    <h1>💬 Persona Chat</h1>
    <p>AI simulations of Hitesh Choudhary & Piyush Garg for learning.</p>
    <div>
      <label for="persona">Choose mentor</label>
      <select id="persona">
        <option value="Hitesh Choudhary">Hitesh Choudhary</option>
        <option value="Piyush Garg">Piyush Garg</option>
      </select>
    </div>
    <button class="primary" id="newChat">New Chat</button>
    <p id="personaDesc"></p>
    <p style="font-size:0.75rem;color:#6b7280;">Not affiliated with the real creators.</p>
  </aside>

  <main>
    <header>
      <h2 id="mentorName">Hitesh Choudhary</h2>
      <span id="mentorTag">Friendly Hinglish educator</span>
    </header>
    <div id="chat"><p class="empty">Ask anything about programming, career, or tech...</p></div>
    <p class="typing" id="typing" hidden>Thinking...</p>
    <form id="form">
      <input id="input" placeholder="Ask something..." autocomplete="off" required />
      <button class="primary" type="submit">Send</button>
    </form>
  </main>

  <script>
    const PERSONA_INFO = {
      "Hitesh Choudhary": {
        tag: "Friendly Hinglish educator — step by step, motivational",
        desc: "Practical teaching style inspired by Chai aur Code. Hinglish, analogies, beginner-friendly."
      },
      "Piyush Garg": {
        tag: "Direct technical educator — structured deep-dives",
        desc: "Engineering-focused style inspired by piyushgarg.dev. Clear definitions, production context."
      }
    };

    let messages = [];
    const chat = document.getElementById("chat");
    const personaSelect = document.getElementById("persona");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const typing = document.getElementById("typing");

    function updatePersonaUI() {
      const p = personaSelect.value;
      document.getElementById("mentorName").textContent = p;
      document.getElementById("mentorTag").textContent = PERSONA_INFO[p].tag;
      document.getElementById("personaDesc").textContent = PERSONA_INFO[p].desc;
      input.placeholder = `Ask ${p.split(" ")[0]} something...`;
    }

    function render() {
      if (!messages.length) {
        chat.innerHTML = '<p class="empty">Ask anything about programming, career, or tech...</p>';
        return;
      }
      chat.innerHTML = messages.map(m => {
        const html = m.role === "assistant" ? marked.parse(m.content) : escapeHtml(m.content);
        return `<div class="msg ${m.role}">${html}</div>`;
      }).join("");
      chat.scrollTop = chat.scrollHeight;
    }

    function escapeHtml(t) {
      return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    personaSelect.addEventListener("change", () => {
      messages = [];
      updatePersonaUI();
      render();
    });

    document.getElementById("newChat").addEventListener("click", () => {
      messages = [];
      render();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      messages.push({ role: "user", content: text });
      input.value = "";
      render();
      typing.hidden = false;

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ persona: personaSelect.value, messages })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed");
        messages.push({ role: "assistant", content: data.reply });
      } catch (err) {
        messages.push({ role: "assistant", content: "Error: " + err.message });
      }

      typing.hidden = true;
      render();
    });

    updatePersonaUI();
  </script>
</body>
</html>
